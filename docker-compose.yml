services:
  vggt-service:
    build:
      context: .
      dockerfile: Dockerfile.vggt-service
    container_name: vggt-service
    runtime: nvidia
    ports:
      - "8003:8003"
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - CUDA_VISIBLE_DEVICES=0
      - HF_HOME=/workspace/.cache/huggingface
    shm_size: '8g'
    volumes:
      - model-cache:/workspace/.cache/huggingface
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/vggt_p/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 180s

volumes:
  model-cache:
